<div id="sideNav" class="d-flex flex-row flex-lg-column align-items-center" [class.is-collapsed]="isCollapsed()">
  <div id="logo" class="logo-container d-none d-lg-flex">
    <a routerLink="/">
      <img
        class="logo"
        [src]="isCollapsed() ? 'assets/icons/logo-flowdesk-initial-inverted-271px.svg' : 'assets/icons/logo-flowdesk-inverted-512px.svg'"
        [alt]="isCollapsed() ? 'Flowdesk Initial Logo' : 'Flowdesk Logo'"
      />
    </a>
  </div>
  <button
    type="button"
    class="collapse-toggle d-none d-lg-flex align-items-center justify-content-center"
    (click)="toggleCollapse()"
    [attr.aria-label]="isCollapsed() ? 'Expand navigation' : 'Collapse navigation'"
    [attr.aria-expanded]="!isCollapsed()"
  >
    @if (isCollapsed()) {
      <i class="bi bi-chevron-double-right" aria-hidden="true"></i>
    } @else {
      <i class="bi bi-chevron-double-left" aria-hidden="true"></i>
    }
  </button>
  <div class="w-100 h-100 d-flex flex-column justify-content-between">
    <nav id="main-nav" class="side-nav-section side-nav-section--main w-100">
      <ul class="navigation side-nav-list d-flex flex-row gap-lg-0 flex-lg-column justify-content-evenly">
        @if (isLoggedIn()) {
        <li routerLinkActive="active" class="nav-item">
          <a routerLink="/summary" class="nav-link d-flex gap-lg-3 flex-column flex-lg-row align-items-center"><i class="bi bi-calendar4-week"></i><span class="nav-label">Summary</span></a>
        </li>
        <li routerLinkActive="active">
          <a routerLink="/add-task" class="nav-link d-flex gap-lg-3 flex-column flex-lg-row align-items-center"><i class="bi bi-pencil-square"></i><span class="nav-label">Add Task</span></a>
        </li>
        <li routerLinkActive="active">
          <a routerLink="/board" class="nav-link d-flex gap-lg-3 flex-column flex-lg-row align-items-center"><i class="bi bi-kanban"></i><span class="nav-label">Board</span></a>
        </li>
        <li routerLinkActive="active">
          <a routerLink="/contacts" class="nav-link d-flex gap-lg-3 flex-column flex-lg-row align-items-center"><i class="bi bi-people"></i><span class="nav-label">Contacts</span></a>
        </li>
        <li routerLinkActive="active" class="d-none nav-item d-block">
          <a routerLink="/test">UI & TEST</a>
        </li>
        } @else {
        <li routerLinkActive="active" class="nav-item">
          <a routerLink="/login" class="nav-link d-flex gap-lg-2 flex-column flex-lg-row align-items-center"><img
              class="default" src="assets/icons/nav-login-30px.svg" alt="Login Icon" /><img class="active"
              src="assets/icons/nav-login-30px.svg" alt="Login Icon" /><span class="nav-label">Login</span></a>
        </li>
        }
      </ul>
    </nav>
    <nav id="footer-nav" class="side-nav-section d-none d-lg-block w-100" [class.footer-hidden]="isCollapsed()">
      <ul class="navigation side-nav-list d-flex flex-row gap-lg-0 flex-lg-column justify-content-evenly">
        <li routerLinkActive="active" class="nav-item">
          <a routerLink="/privacy-policy"
            class="nav-link d-flex gap-lg-3 flex-column flex-lg-row align-items-center">Privacy Policy</a>
        </li>
        <li routerLinkActive="active" class="nav-item">
          <a routerLink="/legal-notice"
            class="nav-link d-flex gap-lg-3 flex-column flex-lg-row align-items-center">Legal Notice</a>
        </li>
      </ul>
    </nav>
  </div>
</div>
