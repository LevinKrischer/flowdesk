<label for="Subtasks" class="form-label">Subtasks</label>
<div class="input-group">
  <input
    type="text"
    id="Subtasks"
    class="form-control"
    placeholder="Add new subtask"
    [(ngModel)]="newSubtaskTitle"
    name="newSubtask"
    (keydown.enter)="addSubtask(); $event.preventDefault()"
  />
  <button type="button" class="btn btn-outline-secondary" (click)="newSubtaskTitle = ''">
    <img src="/assets/icons/cancel-dark-24px.svg" alt="Clear" />
  </button>
  <button type="button" class="btn btn-outline-secondary" (click)="addSubtask()">
    <img src="/assets/icons/check-dark-24px.svg" alt="Add" />
  </button>
</div>
@if (subtasks().length > 0) {
  <ul class="subtask-list mt-2 ps-4">
    @for (subtask of subtasks(); track $index) {
      <li class="py-1">
        @if (editingSubtaskIndex === $index) {
          <div class="input-group input-group-sm">
            <input
              type="text"
              class="form-control"
              [(ngModel)]="editingSubtaskTitle"
              [ngModelOptions]="{ standalone: true }"
              (keydown.enter)="confirmEditSubtask(); $event.preventDefault()"
              (keydown.escape)="cancelEditSubtask()"
            />
            <button type="button" class="btn btn-outline-secondary" (click)="editingSubtaskTitle = ''">
              <img src="/assets/icons/delete-dark-24px.svg" alt="Clear" width="18" height="18" />
            </button>
            <button type="button" class="btn btn-outline-secondary" (click)="confirmEditSubtask()">
              <img src="/assets/icons/check-dark-24px.svg" alt="Confirm" width="18" height="18" />
            </button>
          </div>
        } @else {
          <div class="d-flex align-items-center">
            <span>{{ subtask.title }}</span>
            <button type="button" class="btn btn-sm btn-link p-0 ms-auto" (click)="editSubtask($index)">
              <img src="/assets/icons/edit-dark-24px.svg" alt="Edit" width="18" height="18" />
            </button>
            <button type="button" class="btn btn-sm btn-link p-0 ms-1" (click)="removeSubtask($index)">
              <img src="/assets/icons/delete-dark-24px.svg" alt="Delete" width="18" height="18" />
            </button>
          </div>
        }
      </li>
    }
  </ul>
}
