<div class="mb-3">
  @if (label) {
    <label [for]="id" class="form-label">{{ label }}</label>
  }

  <select [id]="id" class="form-control" [value]="selectedValue">
    <option value="" disabled selected>{{ preselectedValue }}</option>

    @for (option of options; track option.value) {
      <option [value]="option.value">
        {{ option.label }}
      </option>
    }
  </select>

  @if (errorMessage) {
    <div class="text-danger">{{ errorMessage }}</div>
  }
</div>
