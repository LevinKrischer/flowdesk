<div class="mb-3">
  @if (label) {
    <label [for]="id" class="form-label">{{ label }}</label>
  }

  <textarea
    [id]="id"
    [attr.placeholder]="placeholder"
    [attr.rows]="rows"
    class="form-control"
  ></textarea>

  @if (errorMessage) {
    <div class="text-danger">{{ errorMessage }}</div>
  }
</div>
