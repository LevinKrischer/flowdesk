<button
  [attr.type]="type"
  class="btn"
  [class.btn--primary]="variant === 'primary'"
  [class.btn--secondary]="variant === 'secondary'"
  [class.btn--urgent]="variant === 'urgent'"
  [class.btn--medium]="variant === 'medium'"
  [class.btn--low]="variant === 'low'"
  [class.btn--fab-primary]="variant === 'fab-primary'"
  [class.btn--fab-secondary]="variant === 'fab-secondary'"
  [class.btn--icon-sm]="variant === 'icon-sm'"
  [class.active]="active"
  [disabled]="disabled"
>
  <ng-content></ng-content>
  @if (bootstrapIcon) {
    <i [class]="'btn__bootstrap-icon bi ' + bootstrapIcon" aria-hidden="true"></i>
  }
</button>
