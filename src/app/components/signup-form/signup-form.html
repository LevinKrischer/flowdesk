<form (ngSubmit)="submit()" class="d-flex flex-column pt-4">

  <app-input-field
    type="text"
    label="Name"
    placeholder="Name"
    bootstrapIconStart="bi-person"
    autocomplete="name"
    [(model)]="form.name"
    [error]="errors.name"
    [maxlength]="30"
    [displayLabel]="false"
    [reserveErrorSpace]="true"
    (blur)="markDirty('name')"
    (input)="liveValidate('name')"
  />

  <app-input-field
    type="email"
    label="Email"
    placeholder="Email"
    bootstrapIconStart="bi-envelope-at"
    autocomplete="email"
    [(model)]="form.email"
    [error]="errors.email"
    [maxlength]="35"
    [displayLabel]="false"
    [reserveErrorSpace]="true"
    (blur)="markDirty('email')"
    (input)="liveValidate('email')"
  />

  <app-input-field
    [type]="getPasswordFieldType('password')"
    label="Password"
    placeholder="Password"
    bootstrapIconStart="bi-lock"
    [bootstrapIconEnd]="getPasswordFieldIcon('password')"
    [bootstrapIconEndClickable]="isPasswordToggleVisible('password')"
    [bootstrapIconEndLabel]="getPasswordIconAlt('password')"
    autocomplete="new-password"
    [(model)]="form.password"
    [error]="errors.password"
    [displayLabel]="false"
    [reserveErrorSpace]="true"
    (blur)="markDirty('password')"
    (focus)="activatePasswordToggle('password')"
    (input)="liveValidate('password')"
    (iconClick)="togglePasswordVisibility('password')"
  />

  <app-input-field
    [type]="getPasswordFieldType('confirmPassword')"
    label="Confirm Password"
    placeholder="Confirm Password"
    bootstrapIconStart="bi-lock"
    [bootstrapIconEnd]="getPasswordFieldIcon('confirmPassword')"
    [bootstrapIconEndClickable]="isPasswordToggleVisible('confirmPassword')"
    [bootstrapIconEndLabel]="getPasswordIconAlt('confirmPassword')"
    autocomplete="new-password"
    [(model)]="form.confirmPassword"
    [error]="errors.confirmPassword"
    [displayLabel]="false"
    [reserveErrorSpace]="true"
    (blur)="markDirty('confirmPassword')"
    (focus)="activatePasswordToggle('confirmPassword')"
    (input)="liveValidate('confirmPassword')"
    (iconClick)="togglePasswordVisibility('confirmPassword')"
  />

  <div
    class="mb-3 d-flex justify-content-center align-items-center gap-2 signup-form__privacy"
    (click)="form.acceptedPrivacy = !form.acceptedPrivacy"
  >
    <i
      class="bi fs-5"
      [class.bi-check-square-fill]="form.acceptedPrivacy"
      [class.bi-square]="!form.acceptedPrivacy"
      [attr.aria-label]="form.acceptedPrivacy ? 'Accepted' : 'Not accepted'"
    ></i>
    <label class="mb-0 user-select-none" for="acceptPrivacy">
      I accept the
      <a routerLink="/privacy-policy" target="_blank" class="text-primary" (click)="$event.stopPropagation()">
        Privacy Policy
      </a>
    </label>
  </div>

  <div class="d-flex flex-column flex-lg-row gap-2 gap-lg-4 mt-lg-2 align-items-center justify-content-center justify-content-lg-center w-100">
    <ui-button type="submit" variant="primary" [disabled]="!isFormValid() || isSubmitting()">
      Sign Up
    </ui-button>
  </div>

  <div class="text-danger fw-bold mt-2">
    @if (errorMessage()) {
      {{ errorMessage() }}
    }
  </div>

</form>
